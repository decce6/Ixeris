name: Publish

on:
  workflow_dispatch:
    inputs:
      loader:
        type: choice
        description: Loader
        options:
          - all
          - fabric
          - neoforge
          - forge

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
      - name: Publish Mod
        run: ./gradlew publishAll -P"target_versions=<=26.1" -Ptarget_publish_loader=${{ inputs.loader }}
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}